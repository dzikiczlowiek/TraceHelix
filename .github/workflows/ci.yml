name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up .NET 10
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          global-json-file: global.json
      - name: Set up uv and Python
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244 # v7.1.4
        with:
          version: 0.11.29
          python-version: '3.11.15'
          enable-cache: true
          cache-dependency-glob: training/uv.lock
      - name: Install locked exporter dependencies
        run: uv sync --locked --project training
      - name: Restore locked dependencies
        run: dotnet restore TraceHelix.slnx --locked-mode
      - name: Verify formatting
        run: dotnet format TraceHelix.slnx --verify-no-changes --no-restore
      - name: Build Release
        run: dotnet build TraceHelix.slnx --configuration Release --no-restore
      - name: Test Release
        run: dotnet test TraceHelix.slnx --configuration Release --no-build --no-restore

  e2e:
    name: Real-process end-to-end
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up .NET 10
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          global-json-file: global.json
      - name: Restore locked dependencies
        run: dotnet restore TraceHelix.slnx --locked-mode
      - name: Build Release
        run: dotnet build TraceHelix.slnx --configuration Release --no-restore
      - name: Verify CLI real-process workflow
        run: make verify-e2e
      - name: Verify API real-process workflow
        run: make verify-api

  containers:
    name: Container build and supply-chain gates
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify repository security guards
        run: python scripts/test_repository_guards.py
      - name: Verify external build dependency pins
        run: python scripts/verify_container_pins.py
      - name: Build digest-pinned production images
        run: docker compose --profile tools build --pull
      - name: Verify Compose restart and recreation lifecycle
        run: bash scripts/verify-compose-lifecycle.sh
      - name: Generate API SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          image: tracehelix-api:local
          artifact-name: tracehelix-api.spdx.json
          format: spdx-json
          syft-version: v1.42.3
          upload-artifact-retention: 14
          upload-release-assets: false
      - name: Generate web SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          image: tracehelix-web:local
          artifact-name: tracehelix-web.spdx.json
          format: spdx-json
          syft-version: v1.42.3
          upload-artifact-retention: 14
          upload-release-assets: false
      - name: Scan API image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: tracehelix-api:local
          version: v0.72.0
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: 1
      - name: Scan web image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: tracehelix-web:local
          version: v0.72.0
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: 1
          skip-setup-trivy: true

  web:
    name: Web
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up .NET 10 for contract generation
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          global-json-file: global.json
      - name: Set up Node.js 24
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Restore API contract generator dependencies (locked)
        run: dotnet restore ../src/TraceHelix.Api/TraceHelix.Api.csproj --locked-mode
      - name: Check generated API contract
        run: npm run check:api
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm exec -- vitest run
      - name: Build
        run: npm run build
      - name: Audit production and development dependencies
        run: npm audit --audit-level=high

  browser:
    name: Browser acceptance
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js 24
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install locked web dependencies
        run: npm ci
        working-directory: web
      - name: Install Playwright Chromium and OS dependencies
        run: npm exec -- playwright install --with-deps chromium
        working-directory: web
      - name: Verify browser acceptance through the real production topology
        run: bash scripts/verify-browser.sh

  python:
    name: Python
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: training
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up uv and Python
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244 # v7.1.4
        with:
          version: 0.11.29
          python-version: '3.11.15'
          enable-cache: true
          cache-dependency-glob: training/uv.lock
      - name: Install locked dependencies
        run: uv sync --locked
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy .
      - name: Pytest
        run: uv run pytest
