map $uri $tracehelix_cache_control {
    ~^/assets/ "public, max-age=31536000, immutable";
    default "no-store";
}

map $http_host $tracehelix_host_allowed {
    default 0;
    "~^127\.0\.0\.1(?::[0-9]{1,5})?$" 1;
    "~*^localhost(?::[0-9]{1,5})?$" 1;
}

resolver 127.0.0.11 valid=1s ipv6=off;

server {
    listen 8080 default_server;
    server_name _;
    return 444;
}

server {
    listen 8080;
    server_name 127.0.0.1 localhost;
    server_tokens off;

    if ($tracehelix_host_allowed = 0) {
        return 444;
    }

    root /usr/share/nginx/html;
    index index.html;

    add_header Cache-Control $tracehelix_cache_control always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location ~ ^/(api|health)/ {
        set $tracehelix_api api:5080;
        proxy_pass http://$tracehelix_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
